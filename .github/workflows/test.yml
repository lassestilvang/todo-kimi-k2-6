name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Bun tests
        run: npm test

      - name: Run Jest tests
        run: npm run test:jest

      - name: Run performance tests
        run: npm run test:perf

      - name: Build
        run: npm run build
